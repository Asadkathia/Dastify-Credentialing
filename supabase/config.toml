# Supabase local-dev configuration for integration tests.
#
# This file is consumed by `supabase start` (Supabase CLI) to boot a local
# Postgres + GoTrue + Storage stack inside Docker. The integration test
# bootstrap (tests/integration/setup.ts) reuses the running instance and
# applies migrations from db/migrations/ via the project's own runner.
#
# Production data lives in the remote project (`ocltcmqsqmtaqkkmfucs`); this
# config never touches it.

project_id = "dastify-credentialing-local"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true  # admin.createUser uses this path; the production app
                     # never exposes a public signup route
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
