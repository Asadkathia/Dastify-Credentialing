<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dastify — Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#0E143C; --teal:#16C1C2; --aqua:#4ECED1; --charcoal:#222;
  --lightgrey:#F6F7FB; --grey:#C6CCD8; --white:#fff;
  --red:#B3261E; --green:#2E7D32; --amber:#F4A300;
  --navy-04:rgba(14,20,60,0.04); --navy-02:rgba(14,20,60,0.02);
  --teal-12:rgba(22,193,194,0.12); --teal-08:rgba(22,193,194,0.08);
  --red-08:rgba(179,38,30,0.08); --green-08:rgba(46,125,50,0.08); --amber-08:rgba(244,163,0,0.10);
  --shadow-xs:0 1px 0 rgba(14,20,60,0.04);
  --shadow-sm:0 1px 2px rgba(14,20,60,0.06), 0 1px 1px rgba(14,20,60,0.04);
  --border:rgba(198,204,216,0.55);
}
*,*::before,*::after { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Poppins',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased; color:var(--charcoal); background:var(--lightgrey);
  font-size:14px; line-height:22px;
}
button, input, select { font-family:inherit; }
button { cursor:pointer; }
a { color:inherit; text-decoration:none; }

.topbar {
  height:56px; background:var(--navy); color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; position:sticky; top:0; z-index:50;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.brand { display:flex; align-items:center; gap:10px; font-weight:600; }
.brand-mark {
  width:26px; height:26px; border-radius:6px; background:var(--teal);
  display:flex; align-items:center; justify-content:center;
  color:var(--navy); font-size:12px; font-weight:700;
}
.brand-name { font-size:15px; }
.brand-sep { color:rgba(255,255,255,0.3); margin:0 4px; }
.brand-page { font-size:13px; color:rgba(255,255,255,0.65); font-weight:400; }
.brand-crumb { font-size:13px; color:white; font-weight:400; }
.topbar-search {
  display:flex; align-items:center; gap:8px; padding:6px 10px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1);
  border-radius:6px; color:rgba(255,255,255,0.65); font-size:12px; min-width:300px;
}
.topbar-search kbd {
  margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:1px 5px; background:rgba(255,255,255,0.1); border-radius:3px;
}
.topbar-actions { display:flex; align-items:center; gap:6px; }
.topbar-icon-btn {
  width:34px; height:34px; border-radius:6px; background:none; border:none;
  color:rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center;
  position:relative;
}
.topbar-icon-btn:hover { background:rgba(255,255,255,0.08); color:white; }
.topbar-icon-btn .ping {
  position:absolute; top:6px; right:6px; width:8px; height:8px;
  background:var(--teal); border-radius:50%; box-shadow:0 0 0 2px var(--navy);
}
.avatar {
  width:30px; height:30px; border-radius:50%;
  background:var(--teal); color:var(--navy);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600;
}

.app-body { display:flex; min-height:calc(100vh - 56px); }
.sidebar {
  width:240px; flex-shrink:0; background:var(--white);
  border-right:1px solid var(--border); padding:24px 0;
}
.sidebar-section { padding:0 12px; }
.sidebar-label {
  font-size:10px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:rgba(14,20,60,0.45);
  padding:0 12px 12px;
}
.sidebar-item {
  display:flex; align-items:center; gap:12px; padding:9px 12px;
  border-radius:6px; color:rgba(14,20,60,0.7);
  font-size:13px; font-weight:500;
  position:relative; margin-bottom:1px; transition:all 120ms;
}
.sidebar-item:hover { background:var(--navy-04); color:var(--navy); }
.sidebar-item.is-active { background:var(--teal-08); color:var(--navy); font-weight:600; }
.sidebar-item.is-active::before {
  content:""; position:absolute; left:-12px; top:6px; bottom:6px;
  width:2px; background:var(--teal); border-radius:0 2px 2px 0;
}
.sidebar-item.is-active svg { color:var(--teal); }
.sidebar-badge {
  margin-left:auto; padding:1px 7px;
  background:var(--amber-08); color:var(--amber);
  border-radius:9999px; font-size:10px; font-weight:600;
}
.sidebar-divider { margin:16px 24px; height:1px; background:var(--border); }

.main { flex:1; min-width:0; padding:28px 28px 64px; max-width:1600px; }
.page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:18px; }
.page-h1 { font-size:24px; font-weight:600; color:var(--navy); margin:0; letter-spacing:-0.005em; }
.page-sub { font-size:13px; color:rgba(14,20,60,0.6); margin-top:4px; }
.page-sub strong { color:var(--charcoal); font-weight:600; }
.page-actions { display:flex; gap:8px; }

.tab-strip {
  display:flex; gap:2px; border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.tab {
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 14px; background:none; border:none;
  font-size:13px; font-weight:500; color:rgba(14,20,60,0.6);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all 120ms;
}
.tab:hover { color:var(--navy); }
.tab.is-active { color:var(--navy); font-weight:600; border-bottom-color:var(--teal); }
.tab-count {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:20px; height:18px; padding:0 6px;
  background:var(--lightgrey); color:rgba(14,20,60,0.6);
  border-radius:9px; font-size:11px; font-weight:600;
}
.tab.is-active .tab-count { background:var(--teal-12); color:var(--teal); }

.toolbar {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; background:white;
  border:1px solid var(--border); border-radius:8px 8px 0 0;
  border-bottom:none;
}
.search-input {
  flex:1; max-width:340px;
  display:flex; align-items:center; gap:8px;
  padding:7px 11px; background:var(--lightgrey);
  border:1px solid var(--border); border-radius:6px;
  color:rgba(14,20,60,0.55); font-size:13px;
}
.search-input input { border:none; background:none; outline:none; flex:1; font-size:13px; color:var(--charcoal); }
.fp {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 11px; background:white;
  border:1px solid var(--border); border-radius:6px;
  font-size:12px; font-weight:500; color:var(--charcoal);
}
.fp:hover { background:var(--lightgrey); border-color:var(--grey); }
.toolbar-spacer { flex:1; }
.toolbar-meta { font-size:12px; color:rgba(14,20,60,0.55); }
.toolbar-meta strong { color:var(--charcoal); font-weight:600; }

.tbl-wrap {
  background:white; border:1px solid var(--border); border-radius:0 0 8px 8px;
  overflow:hidden; box-shadow:var(--shadow-xs);
}
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl thead th {
  text-align:left; padding:9px 16px;
  font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(14,20,60,0.6);
  border-bottom:1px solid var(--border); background:var(--lightgrey);
  white-space:nowrap;
}
.tbl thead th.right, .tbl tbody td.right { text-align:right; }
.tbl tbody td {
  padding:13px 16px; border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.tbl tbody tr:last-child td { border-bottom:none; }
.tbl tbody tr:hover { background:var(--navy-02); cursor:pointer; }
.tbl-name { font-weight:600; color:var(--navy); font-size:13px; }
.tbl-sub { font-size:11px; color:rgba(14,20,60,0.55); margin-top:2px; }
.mono { font-family:'JetBrains Mono', monospace; font-variant-numeric:tabular-nums; font-size:12px; }

.cell-name { display:flex; align-items:center; gap:10px; }
.entity-icon {
  width:32px; height:32px; border-radius:6px;
  background:var(--teal-08); color:var(--navy);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0;
}
.entity-icon.payer-icon { background:var(--lightgrey); }
.entity-icon.client-icon { background:var(--navy); color:white; }

.pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:600; letter-spacing:0.06em;
  text-transform:uppercase; line-height:1.4; white-space:nowrap;
}
.pill-warn   { background:var(--amber-08); color:#7a4f00; }
.pill-danger { background:var(--red-08);   color:var(--red); }
.pill-ok     { background:var(--green-08); color:#1B5E20; }
.pill-flat   { background:var(--lightgrey); color:rgba(14,20,60,0.6); }
.pill-teal   { background:var(--teal-08); color:var(--navy); }
.pill-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

.health-bar {
  width:140px; height:6px; background:var(--lightgrey);
  border-radius:3px; overflow:hidden; display:flex;
}
.health-bar > span { height:100%; }
.health-num { font-size:12px; font-weight:600; color:var(--navy); font-variant-numeric:tabular-nums; }

.spark {
  display:inline-flex; align-items:flex-end; gap:1.5px; height:18px;
}
.spark > span {
  width:3px; background:var(--teal); border-radius:1px; opacity:0.8;
  display:inline-block;
}

/* Detail page */
.detail-back {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 10px; background:white; border:1px solid var(--border);
  border-radius:6px; font-size:12px; font-weight:500; color:var(--charcoal);
  margin-bottom:14px;
}
.detail-back:hover { background:var(--lightgrey); }

.detail-hero {
  background:white; border:1px solid var(--border); border-radius:8px;
  padding:24px; margin-bottom:18px; display:flex; gap:24px;
  box-shadow:var(--shadow-xs);
}
.hero-icon {
  width:64px; height:64px; border-radius:10px; flex-shrink:0;
  background:var(--navy); color:white;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:700; letter-spacing:0.04em;
}
.hero-icon.payer { background:var(--lightgrey); color:var(--navy); border:1px solid var(--border); }
.hero-icon.provider { background:var(--teal-08); color:var(--navy); }
.hero-l { flex:1; min-width:0; }
.hero-eyebrow {
  font-size:10px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:rgba(14,20,60,0.55);
  display:flex; gap:6px; align-items:center; margin-bottom:6px;
}
.hero-h1 {
  font-size:24px; font-weight:600; color:var(--navy);
  margin:0 0 6px; letter-spacing:-0.005em;
}
.hero-meta {
  font-size:13px; color:rgba(14,20,60,0.6);
  display:flex; flex-wrap:wrap; gap:6px 16px;
}
.hero-meta strong { color:var(--charcoal); font-weight:600; }
.hero-r { display:flex; align-items:flex-start; gap:8px; flex-shrink:0; }

.kpi-strip {
  display:grid; grid-template-columns:repeat(4, 1fr);
  gap:14px; margin-bottom:18px;
}
@media (max-width:1100px) { .kpi-strip { grid-template-columns:repeat(2, 1fr); } }
.kpi-tile {
  background:white; border:1px solid var(--border); border-radius:8px; padding:16px 18px;
}
.kpi-l {
  font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(14,20,60,0.55); margin-bottom:8px;
}
.kpi-v {
  font-size:26px; font-weight:700; color:var(--navy);
  font-variant-numeric:tabular-nums; line-height:30px;
  display:flex; align-items:baseline; gap:4px;
}
.kpi-v small { font-size:13px; color:rgba(14,20,60,0.55); font-weight:500; }
.kpi-meta { font-size:11px; color:rgba(14,20,60,0.55); margin-top:6px; }

.split-2 { display:grid; grid-template-columns:65fr 35fr; gap:18px; }
@media (max-width:1100px) { .split-2 { grid-template-columns:1fr; } }

.card {
  background:white; border:1px solid var(--border); border-radius:8px;
  box-shadow:var(--shadow-xs); overflow:hidden; margin-bottom:18px;
}
.card-head {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.card-h { font-size:13px; font-weight:600; color:var(--navy); margin:0; }
.card-sub { font-size:12px; color:rgba(14,20,60,0.55); margin-top:2px; }
.card-body { padding:18px; }
.card-body.flush { padding:0; }

.detail-rows { display:flex; flex-direction:column; gap:0; }
.detail-row {
  display:grid; grid-template-columns:130px 1fr;
  gap:14px; padding:9px 0; border-bottom:1px dashed var(--border);
  font-size:13px;
}
.detail-row:last-child { border-bottom:none; }
.detail-row dt {
  font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(14,20,60,0.55); padding-top:1px;
}
.detail-row dd { margin:0; color:var(--charcoal); }
.detail-row dd a { color:var(--teal); font-weight:500; }

.contact-list { display:flex; flex-direction:column; gap:8px; }
.contact-row {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; background:var(--lightgrey);
  border-radius:6px;
}
.contact-row .avatar { width:34px; height:34px; font-size:12px; }
.contact-l { flex:1; min-width:0; }
.contact-name { font-size:13px; font-weight:600; color:var(--navy); }
.contact-meta { font-size:11px; color:rgba(14,20,60,0.55); }
.contact-role {
  font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  padding:2px 7px; background:white; border-radius:3px;
  color:rgba(14,20,60,0.6); border:1px solid var(--border);
}

/* license/state grid for provider */
.state-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(78px, 1fr));
  gap:6px;
}
.state-cell {
  padding:8px 6px; text-align:center;
  background:var(--lightgrey); border-radius:6px;
  border:1px solid var(--border);
  font-size:11px;
}
.state-cell.is-licensed { background:var(--teal-08); border-color:var(--teal-12); }
.state-cell-code { font-weight:700; color:var(--navy); font-size:14px; line-height:18px; }
.state-cell-meta { font-size:10px; color:rgba(14,20,60,0.55); margin-top:2px; }

/* btns */
.btn-primary {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px; background:var(--navy); color:white;
  border:1px solid var(--navy); border-radius:6px;
  font-size:13px; font-weight:600;
}
.btn-primary:hover { background:#1a2255; }
.btn-ghost {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 14px; background:white; color:var(--charcoal);
  border:1px solid var(--border); border-radius:6px;
  font-size:13px; font-weight:500;
}
.btn-ghost:hover { background:var(--lightgrey); border-color:var(--grey); }

::selection { background:var(--teal-12); color:var(--navy); }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

// ─── Data ───────────────────────────────────────────────────────────────

// ─── Sparkline ──────────────────────────────────────────────────────────
const Spark = ({ data, color = "var(--teal)" }) => {
  const max = Math.max(...data);
  return (
    <span className="spark">
      {data.map((v, i) => <span key={i} style={{ height:`${(v/max)*100}%`, background:color }}/>)}
    </span>
  );
};

// ─── Health bar ─────────────────────────────────────────────────────────
const Health = ({ score }) => {
  const color = score >= 85 ? "var(--green)" : score >= 70 ? "var(--teal)" : score >= 55 ? "var(--amber)" : "var(--red)";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div className="health-bar">
        <span style={{ width:`${score}%`, background:color }}/>
      </div>
      <span className="health-num">{score}</span>
    </div>
  );
};

                    { id:"ENR-104540", payer:"Aetna",     state:"CA", status:"in_review",      idle:11 },
                  ].map(e => (
                    <tr key={e.id} onClick={() => location.href = "Enrollment Detail.html"}>
                      <td><span className="mono" style={{ color:"var(--navy)", fontWeight:600 }}>{e.id}</span></td>
                      <td>{e.payer}</td>
                      <td><span className="mono">{e.state}</span></td>
                      <td><span className={`pill ${e.status === "info_requested" ? "pill-warn" : e.status === "approved" ? "pill-ok" : "pill-teal"}`}><span className="pill-dot"/>{e.status}</span></td>
                      <td><span className="mono" style={{ color:e.idle >= 7 ? "var(--amber)" : "rgba(14,20,60,0.55)" }}>{e.idle}d</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div className="card">
            <div className="card-head"><div><h3 className="card-h">Licensed states</h3><div className="card-sub">Click to view that state's enrollments.</div></div></div>
            <div className="card-body">
              <div className="state-grid">
                {allStates.map(st => {
                  const lic = p.states.includes(st);
                  return (
                    <div key={st} className={`state-cell ${lic ? "is-licensed" : ""}`}>
                      <div className="state-cell-code">{st}</div>
                      <div className="state-cell-meta">{lic ? `${Math.floor(Math.random()*4)+1} active` : "—"}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <div className="card-head"><h3 className="card-h">Identity</h3></div>
            <div className="card-body">
              <dl className="detail-rows">
                <div className="detail-row"><dt>NPI</dt><dd className="mono">{p.npi}</dd></div>
                <div className="detail-row"><dt>CAQH</dt><dd className="mono">{p.caqh}</dd></div>
                <div className="detail-row"><dt>DEA</dt><dd className="mono">BX1234567</dd></div>
                <div className="detail-row"><dt>Tax ID</dt><dd className="mono">XX-XXXXXXX</dd></div>
                <div className="detail-row"><dt>Born</dt><dd>1978-03-14</dd></div>
                <div className="detail-row"><dt>Specialty</dt><dd>{p.specialty}</dd></div>
                <div className="detail-row"><dt>Sub-specialty</dt><dd>—</dd></div>
                <div className="detail-row"><dt>Languages</dt><dd>English, Urdu</dd></div>
              </dl>
            </div>
          </div>
          <div className="card">
            <div className="card-head"><h3 className="card-h">Documents on file</h3></div>
            <div className="card-body">
              <div style={{ display:"flex", flexDirection:"column", gap:6, fontSize:12 }}>
                {[
                  ["Malpractice COI",    "Current",   "exp 2026-09-01", "ok"],
                  ["DEA Registration",   "Current",   "exp 2026-12-31", "ok"],
                  ["Specialty Board",    "Expired",   "exp 2026-04-15", "danger"],
                  ["State License — TX", "Current",   "exp 2027-01-30", "ok"],
                  ["Hospital Privileges","Current",   "letter 2026-03-10", "ok"],
                  ["W-9",                "Current",   "—", "ok"],
                ].map(([n, s, m, k], i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:10, padding:"7px 10px", background:k === "danger" ? "var(--red-08)" : "var(--lightgrey)", borderRadius:5 }}>
                    <div>
                      <div style={{ fontWeight:600, color:"var(--navy)", fontSize:12.5 }}>{n}</div>
                      <div style={{ fontSize:10.5, color:"rgba(14,20,60,0.55)" }}>{m}</div>
                    </div>
                    <span className={`pill ${k === "danger" ? "pill-danger" : "pill-ok"}`}><span className="pill-dot"/>{s}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
};

// ─── Payers list ────────────────────────────────────────────────────────
const PayersList = ({ go }) => (
  <>
    <div className="page-header">
      <div>
        <h1 className="page-h1">Payers</h1>
        <div className="page-sub">Network library · <strong>{payers.length}</strong> payers · <strong>{payers.reduce((s,p)=>s+p.enrollments,0)}</strong> active enrollments</div>
      </div>
      <div className="page-actions">
        <button className="btn-ghost"><Icon name="download" size={13}/>Export</button>
        <button className="btn-primary"><Icon name="plus" size={13}/>Add payer</button>
      </div>
    </div>
    <div className="toolbar">
      <div className="search-input"><Icon name="search" size={13}/><input placeholder="Search payers…"/></div>
      <button className="fp">Type <Icon name="chevron" size={11}/></button>
      <button className="fp">CAQH <Icon name="chevron" size={11}/></button>
      <button className="fp">State <Icon name="chevron" size={11}/></button>
      <div className="toolbar-spacer"/>
      <span className="toolbar-meta"><strong>{payers.length}</strong> payers</span>
    </div>
    <div className="tbl-wrap">
      <table className="tbl">
        <thead><tr>
          <th>Payer</th><th>Type</th><th>States</th><th>Providers</th><th>Enrollments</th><th>Avg days</th><th>Denial rate</th><th>CAQH</th>
        </tr></thead>
        <tbody>
          {payers.map(p => (
            <tr key={p.id} onClick={() => alert(`${p.name} detail — payer profile not yet built`)}>
              <td>
                <div className="cell-name">
                  <div className="entity-icon payer-icon" style={{ background:"var(--lightgrey)", color:"var(--navy)" }}>{p.name.slice(0,2).toUpperCase()}</div>
                  <div className="tbl-name">{p.name}</div>
                </div>
              </td>
              <td>{p.type}</td>
              <td><span className="mono">{p.states}</span></td>
              <td><span className="mono">{p.providers}</span></td>
              <td><span className="mono">{p.enrollments}</span></td>
              <td>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span className="mono">{p.avgDays}d</span>
                  <Spark data={p.spark} color={p.avgDays > 90 ? "var(--amber)" : "var(--teal)"}/>
                </div>
              </td>
              <td>
                {p.denialRate >= 10 ? <span className="pill pill-warn"><span className="pill-dot"/>{p.denialRate}%</span>
                : p.denialRate >= 7 ? <span className="pill pill-flat"><span className="pill-dot"/>{p.denialRate}%</span>
                : <span className="pill pill-ok"><span className="pill-dot"/>{p.denialRate}%</span>}
              </td>
              <td>{p.caqh ? <span className="pill pill-teal"><span className="pill-dot"/>Yes</span> : <span className="pill pill-flat">—</span>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </>
);

// ─── App ────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState({ screen: t.screen || "clients_list", params: {} });
  const go = (screen, params = {}) => {
    setRoute({ screen, params });
    if (["clients_list","providers_list","payers_list","client_detail","provider_detail"].includes(screen)) {
      setTweak("screen", screen);
    }
  };

  // Sync route from tweaks if changed via panel
  React.useEffect(() => {
    if (t.screen && t.screen !== route.screen && !route.params.id) {
      setRoute({ screen: t.screen, params: {} });
    }
  }, [t.screen]);

  const sec =
    route.screen === "clients_list"   ? "clients" :
    route.screen === "client_detail"  ? "clients" :
    route.screen === "providers_list" ? "providers" :
    route.screen === "provider_detail"? "providers" :
                                        "payers";

  const crumbs = useMemo(() => {
    if (route.screen === "clients_list")    return [{ label:"Clients" }];
    if (route.screen === "providers_list")  return [{ label:"Providers" }];
    if (route.screen === "payers_list")     return [{ label:"Payers" }];
    if (route.screen === "client_detail") {
      const c = clients.find(x => x.id === route.params.id) || clients[0];
      return [{ label:"Clients", href:"#", onClick:(e) => { e.preventDefault(); go("clients_list"); } }, { label:c.name }];
    }
    if (route.screen === "provider_detail") {
      const p = providers.find(x => x.id === route.params.id) || providers[0];
      return [{ label:"Providers", href:"#", onClick:(e) => { e.preventDefault(); go("providers_list"); } }, { label:p.name }];
    }
    return [];
  }, [route]);

  return (
    <>
      <TopBar crumbs={crumbs}/>
      <div className="app-body">
        <Sidebar activeKey={sec}/>
        <main className="main">
          {/* Top tab strip — visible on list screens to switch between Clients/Providers/Payers */}
          {(route.screen.endsWith("_list")) && (
            <div className="tab-strip">
              <button className={`tab ${route.screen === "clients_list" ? "is-active" : ""}`} onClick={() => go("clients_list")}>Clients <span className="tab-count">{clients.length}</span></button>
              <button className={`tab ${route.screen === "providers_list" ? "is-active" : ""}`} onClick={() => go("providers_list")}>Providers <span className="tab-count">{providers.length}</span></button>
              <button className={`tab ${route.screen === "payers_list" ? "is-active" : ""}`} onClick={() => go("payers_list")}>Payers <span className="tab-count">{payers.length}</span></button>
            </div>
          )}

          {route.screen === "clients_list"    && <ClientsList   go={go}/>}
          {route.screen === "client_detail"   && <ClientDetail   id={route.params.id} go={go}/>}
          {route.screen === "providers_list"  && <ProvidersList go={go}/>}
          {route.screen === "provider_detail" && <ProviderDetail id={route.params.id} go={go}/>}
          {route.screen === "payers_list"     && <PayersList    go={go}/>}
        </main>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Jump to screen">
          <TweakRadio
            value={route.screen.endsWith("_detail") ? route.screen.replace("_detail","_list") : route.screen}
            onChange={v => go(v)}
            options={[
              { value:"clients_list",   label:"Clients" },
              { value:"providers_list", label:"Providers" },
              { value:"payers_list",    label:"Payers" },
            ]}
          />
          <div style={{ fontSize:11, color:"rgba(14,20,60,0.55)", marginTop:8, lineHeight:1.5 }}>
            Click any row in a list to drill into the detail page. Use the back button or breadcrumb to return.
          </div>
        </TweakSection>
        <TweakSection title="Quick detail">
          <button className="btn-ghost" style={{ width:"100%", justifyContent:"center", marginBottom:6 }} onClick={() => go("client_detail", { id:"khan" })}>Khan client detail →</button>
          <button className="btn-ghost" style={{ width:"100%", justifyContent:"center" }} onClick={() => go("provider_detail", { id:"khan_imran" })}>Dr. Khan provider detail →</button>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
