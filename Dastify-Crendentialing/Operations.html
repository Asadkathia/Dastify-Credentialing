<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dastify — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#0E143C; --teal:#16C1C2; --aqua:#4ECED1; --charcoal:#222;
  --lightgrey:#F6F7FB; --grey:#C6CCD8; --white:#fff;
  --red:#B3261E; --green:#2E7D32; --amber:#F4A300;
  --navy-04:rgba(14,20,60,0.04); --navy-02:rgba(14,20,60,0.02);
  --teal-12:rgba(22,193,194,0.12); --teal-08:rgba(22,193,194,0.08);
  --red-08:rgba(179,38,30,0.08); --green-08:rgba(46,125,50,0.08); --amber-08:rgba(244,163,0,0.10);
  --shadow-xs:0 1px 0 rgba(14,20,60,0.04);
  --border:rgba(198,204,216,0.55);
}
*,*::before,*::after { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Poppins',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased; color:var(--charcoal); background:var(--lightgrey);
  font-size:14px; line-height:22px;
}
button, input, select { font-family:inherit; }
button { cursor:pointer; }
a { color:inherit; text-decoration:none; }

.topbar { height:56px; background:var(--navy); color:white; display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:50; border-bottom:1px solid rgba(255,255,255,0.06); }
.brand { display:flex; align-items:center; gap:10px; font-weight:600; }
.brand-mark { width:26px; height:26px; border-radius:6px; background:var(--teal); display:flex; align-items:center; justify-content:center; color:var(--navy); font-size:12px; font-weight:700; }
.brand-name { font-size:15px; }
.brand-sep { color:rgba(255,255,255,0.3); margin:0 4px; }
.brand-page { font-size:13px; color:rgba(255,255,255,0.65); font-weight:400; }
.topbar-search { display:flex; align-items:center; gap:8px; padding:6px 10px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:rgba(255,255,255,0.65); font-size:12px; min-width:300px; }
.topbar-search kbd { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; padding:1px 5px; background:rgba(255,255,255,0.1); border-radius:3px; }
.topbar-actions { display:flex; align-items:center; gap:6px; }
.topbar-icon-btn { width:34px; height:34px; border-radius:6px; background:none; border:none; color:rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center; position:relative; }
.topbar-icon-btn:hover { background:rgba(255,255,255,0.08); color:white; }
.topbar-icon-btn .ping { position:absolute; top:6px; right:6px; width:8px; height:8px; background:var(--teal); border-radius:50%; box-shadow:0 0 0 2px var(--navy); }
.avatar { width:30px; height:30px; border-radius:50%; background:var(--teal); color:var(--navy); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; }

.app-body { display:flex; min-height:calc(100vh - 56px); }
.sidebar { width:240px; flex-shrink:0; background:var(--white); border-right:1px solid var(--border); padding:24px 0; }
.sidebar-section { padding:0 12px; }
.sidebar-label { font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:rgba(14,20,60,0.45); padding:0 12px 12px; }
.sidebar-item { display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:6px; color:rgba(14,20,60,0.7); font-size:13px; font-weight:500; position:relative; margin-bottom:1px; transition:all 120ms; }
.sidebar-item:hover { background:var(--navy-04); color:var(--navy); }
.sidebar-item.is-active { background:var(--teal-08); color:var(--navy); font-weight:600; }
.sidebar-item.is-active::before { content:""; position:absolute; left:-12px; top:6px; bottom:6px; width:2px; background:var(--teal); border-radius:0 2px 2px 0; }
.sidebar-item.is-active svg { color:var(--teal); }
.sidebar-badge { margin-left:auto; padding:1px 7px; background:var(--amber-08); color:var(--amber); border-radius:9999px; font-size:10px; font-weight:600; }
.sidebar-divider { margin:16px 24px; height:1px; background:var(--border); }

.main { flex:1; min-width:0; padding:28px 28px 64px; max-width:1600px; }
.page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:18px; }
.page-h1 { font-size:24px; font-weight:600; color:var(--navy); margin:0; letter-spacing:-0.005em; }
.page-sub { font-size:13px; color:rgba(14,20,60,0.6); margin-top:4px; }
.page-sub strong { color:var(--charcoal); font-weight:600; }
.page-actions { display:flex; gap:8px; }

.tab-strip { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.tab { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; background:none; border:none; font-size:13px; font-weight:500; color:rgba(14,20,60,0.6); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 120ms; }
.tab:hover { color:var(--navy); }
.tab.is-active { color:var(--navy); font-weight:600; border-bottom-color:var(--teal); }
.tab-count { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:18px; padding:0 6px; background:var(--lightgrey); color:rgba(14,20,60,0.6); border-radius:9px; font-size:11px; font-weight:600; }
.tab.is-active .tab-count { background:var(--teal-12); color:var(--teal); }

.toolbar { display:flex; align-items:center; gap:10px; padding:12px 14px; background:white; border:1px solid var(--border); border-radius:8px 8px 0 0; border-bottom:none; }
.search-input { flex:1; max-width:340px; display:flex; align-items:center; gap:8px; padding:7px 11px; background:var(--lightgrey); border:1px solid var(--border); border-radius:6px; color:rgba(14,20,60,0.55); font-size:13px; }
.search-input input { border:none; background:none; outline:none; flex:1; font-size:13px; color:var(--charcoal); }
.fp { display:inline-flex; align-items:center; gap:6px; padding:6px 11px; background:white; border:1px solid var(--border); border-radius:6px; font-size:12px; font-weight:500; color:var(--charcoal); }
.fp:hover { background:var(--lightgrey); border-color:var(--grey); }
.fp.active { background:var(--teal-08); border-color:var(--teal-12); color:var(--navy); }
.toolbar-spacer { flex:1; }
.toolbar-meta { font-size:12px; color:rgba(14,20,60,0.55); }
.toolbar-meta strong { color:var(--charcoal); font-weight:600; }

.tbl-wrap { background:white; border:1px solid var(--border); border-radius:0 0 8px 8px; overflow:hidden; box-shadow:var(--shadow-xs); }
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl thead th { text-align:left; padding:9px 16px; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:rgba(14,20,60,0.6); border-bottom:1px solid var(--border); background:var(--lightgrey); white-space:nowrap; }
.tbl thead th.right, .tbl tbody td.right { text-align:right; }
.tbl tbody td { padding:13px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
.tbl tbody tr:last-child td { border-bottom:none; }
.tbl tbody tr:hover { background:var(--navy-02); }
.tbl-name { font-weight:600; color:var(--navy); font-size:13px; }
.tbl-sub { font-size:11px; color:rgba(14,20,60,0.55); margin-top:2px; }
.mono { font-family:'JetBrains Mono', monospace; font-variant-numeric:tabular-nums; font-size:12px; }

.cell-name { display:flex; align-items:center; gap:10px; }
.doc-icon { width:34px; height:36px; border-radius:5px; background:var(--lightgrey); border:1px solid var(--border); color:rgba(14,20,60,0.6); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; letter-spacing:0.04em; flex-shrink:0; }
.doc-icon.pdf { background:#FFF1EE; color:var(--red); border-color:rgba(179,38,30,0.2); }
.doc-icon.png, .doc-icon.jpg { background:#F0F8F1; color:var(--green); border-color:rgba(46,125,50,0.2); }
.doc-icon.docx { background:#EEF1FA; color:var(--navy); border-color:rgba(14,20,60,0.15); }

.pill { display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; line-height:1.4; white-space:nowrap; }
.pill-warn   { background:var(--amber-08); color:#7a4f00; }
.pill-danger { background:var(--red-08);   color:var(--red); }
.pill-ok     { background:var(--green-08); color:#1B5E20; }
.pill-flat   { background:var(--lightgrey); color:rgba(14,20,60,0.6); }
.pill-teal   { background:var(--teal-08); color:var(--navy); }
.pill-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

.btn-primary { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; background:var(--navy); color:white; border:1px solid var(--navy); border-radius:6px; font-size:13px; font-weight:600; }
.btn-primary:hover { background:#1a2255; }
.btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:9px 14px; background:white; color:var(--charcoal); border:1px solid var(--border); border-radius:6px; font-size:13px; font-weight:500; }
.btn-ghost:hover { background:var(--lightgrey); border-color:var(--grey); }

.kpi-strip { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:18px; }
.kpi-tile { background:white; border:1px solid var(--border); border-radius:8px; padding:16px 18px; }
.kpi-l { font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:rgba(14,20,60,0.55); margin-bottom:8px; }
.kpi-v { font-size:26px; font-weight:700; color:var(--navy); font-variant-numeric:tabular-nums; line-height:30px; display:flex; align-items:baseline; gap:4px; }
.kpi-v small { font-size:13px; color:rgba(14,20,60,0.55); font-weight:500; }
.kpi-meta { font-size:11px; color:rgba(14,20,60,0.55); margin-top:6px; }

.card { background:white; border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow-xs); overflow:hidden; margin-bottom:18px; }
.card-head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.card-h { font-size:13px; font-weight:600; color:var(--navy); margin:0; }
.card-sub { font-size:12px; color:rgba(14,20,60,0.55); margin-top:2px; }
.card-body { padding:18px; }
.card-body.flush { padding:0; }

.split-2 { display:grid; grid-template-columns:65fr 35fr; gap:18px; }
@media (max-width:1100px) { .split-2 { grid-template-columns:1fr; } }
.split-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
@media (max-width:1100px) { .split-3 { grid-template-columns:1fr; } }

/* Audit log */
.audit-wrap {
  background:white; border:1px solid var(--border); border-radius:0 0 8px 8px;
  border-top:none; padding:0; box-shadow:var(--shadow-xs);
}
.audit-row {
  display:grid; grid-template-columns:130px 28px 1fr auto;
  gap:14px; padding:14px 18px;
  border-bottom:1px solid var(--border); align-items:flex-start;
}
.audit-row:last-child { border-bottom:none; }
.audit-row:hover { background:var(--navy-02); }
.audit-time { font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(14,20,60,0.55); padding-top:4px; }
.audit-time .date { color:var(--charcoal); font-weight:500; }
.audit-actor { width:28px; height:28px; border-radius:50%; background:var(--teal-08); color:var(--navy); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.audit-actor.system { background:var(--lightgrey); color:rgba(14,20,60,0.6); }
.audit-actor.payer { background:var(--navy); color:white; }
.audit-msg { font-size:13px; color:var(--charcoal); }
.audit-msg strong { color:var(--navy); font-weight:600; }
.audit-msg a { color:var(--teal); font-weight:500; }
.audit-meta { font-size:11px; color:rgba(14,20,60,0.55); margin-top:3px; }
.audit-diff {
  margin-top:8px; padding:10px 12px;
  background:#0f1430; color:#e8eaf3;
  border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.6;
}
.audit-diff .field { color:rgba(232,234,243,0.55); }
.audit-diff .from  { color:#ffba6b; }
.audit-diff .arrow { color:rgba(232,234,243,0.4); margin:0 6px; }
.audit-diff .to    { color:#7eddb8; font-weight:500; }
.audit-tag { padding-top:2px; }

/* Reports — charts */
.chart-card { background:white; border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow-xs); padding:18px; }
.chart-h { font-size:13px; font-weight:600; color:var(--navy); margin:0 0 4px; }
.chart-sub { font-size:11.5px; color:rgba(14,20,60,0.55); margin-bottom:14px; }
.legend { display:flex; gap:14px; font-size:11px; color:rgba(14,20,60,0.6); margin-bottom:6px; flex-wrap:wrap; }
.legend-dot { display:inline-flex; align-items:center; gap:5px; }
.legend-dot::before { content:""; width:8px; height:8px; border-radius:2px; background:currentColor; }

::selection { background:var(--teal-12); color:var(--navy); }
</style>
</head>

// ─── Charts ─────────────────────────────────────────────────────────────
const BarChart = ({ data, w = 540, h = 220, max = null }) => {
  const M = max || Math.max(...data.map(d => d.value)) * 1.15;
  const padL = 32, padB = 28, padT = 12, padR = 12;
  const cw = w - padL - padR, ch = h - padT - padB;
  const bw = cw / data.length * 0.62;
  const gridY = [0, 0.25, 0.5, 0.75, 1].map(p => padT + ch * p);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:"block" }}>
      {gridY.map((y, i) => (
        <line key={i} x1={padL} x2={w - padR} y1={y} y2={y}
          stroke="rgba(14,20,60,0.08)" strokeDasharray="3 3"/>
      ))}
      {gridY.map((y, i) => (
        <text key={i} x={padL - 8} y={y + 4} textAnchor="end" fontSize="10" fill="rgba(14,20,60,0.5)" fontFamily="JetBrains Mono">
          {Math.round(M * (1 - i * 0.25))}
        </text>
      ))}
      {data.map((d, i) => {
        const cx = padL + (cw / data.length) * (i + 0.5);
        const bh = (d.value / M) * ch;
        return (
          <g key={i}>
            <rect x={cx - bw/2} y={padT + ch - bh} width={bw} height={bh}
              fill={d.color || "var(--teal)"} rx="2"/>
            <text x={cx} y={h - padB + 14} textAnchor="middle" fontSize="10" fill="rgba(14,20,60,0.6)">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
};

const LineChart = ({ series, w = 540, h = 220, labels }) => {
  const padL = 32, padB = 28, padT = 12, padR = 12;
  const cw = w - padL - padR, ch = h - padT - padB;
  const all = series.flatMap(s => s.data);
  const M = Math.max(...all) * 1.15, m = 0;
  const x = (i) => padL + (cw / (labels.length - 1)) * i;
  const y = (v) => padT + ch - ((v - m) / (M - m)) * ch;
  const gridY = [0, 0.25, 0.5, 0.75, 1].map(p => padT + ch * p);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:"block" }}>
      {gridY.map((gy, i) => <line key={i} x1={padL} x2={w - padR} y1={gy} y2={gy} stroke="rgba(14,20,60,0.08)" strokeDasharray="3 3"/>)}
      {gridY.map((gy, i) => (
        <text key={i} x={padL - 8} y={gy + 4} textAnchor="end" fontSize="10" fill="rgba(14,20,60,0.5)" fontFamily="JetBrains Mono">
          {Math.round(M * (1 - i * 0.25))}
        </text>
      ))}
      {series.map((s, si) => {
        const path = s.data.map((v, i) => `${i ? "L" : "M"} ${x(i)} ${y(v)}`).join(" ");
        return (
          <g key={si}>
            <path d={path} fill="none" stroke={s.color} strokeWidth="2"/>
            {s.data.map((v, i) => <circle key={i} cx={x(i)} cy={y(v)} r="3" fill={s.color}/>)}
          </g>
        );
      })}
      {labels.map((l, i) => i % Math.ceil(labels.length / 6) === 0 && (
        <text key={i} x={x(i)} y={h - padB + 14} textAnchor="middle" fontSize="10" fill="rgba(14,20,60,0.6)">{l}</text>
      ))}
    </svg>
  );
};

const HBarChart = ({ data, w = 540, h = 220 }) => {
  const M = Math.max(...data.map(d => d.value)) * 1.1;
  const padL = 110, padR = 50, padT = 4, padB = 4;
  const cw = w - padL - padR;
  const rh = (h - padT - padB) / data.length;
  const bh = rh * 0.6;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:"block" }}>
      {data.map((d, i) => {
        const cy = padT + rh * (i + 0.5);
        const bw = (d.value / M) * cw;
        return (
          <g key={i}>
            <text x={padL - 8} y={cy + 4} textAnchor="end" fontSize="11" fill="var(--charcoal)" fontWeight="500">{d.label}</text>
            <rect x={padL} y={cy - bh/2} width={cw} height={bh} fill="var(--lightgrey)" rx="2"/>
            <rect x={padL} y={cy - bh/2} width={bw} height={bh} fill={d.color || "var(--teal)"} rx="2"/>
            <text x={padL + bw + 6} y={cy + 4} fontSize="11" fill="var(--navy)" fontWeight="600" fontFamily="JetBrains Mono">{d.display || d.value}</text>
          </g>
        );
      })}
    </svg>
  );
};

          <div style={{ fontSize:11, color:"rgba(14,20,60,0.5)", marginTop:8 }}>R. Stein flagged for QA review — sustained 30%+ above team median.</div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div>
            <h3 className="card-h">Denial reasons · last 90 days</h3>
            <div className="card-sub">23 denials total · disclosed only at internal level (not in client view per §C2)</div>
          </div>
          <button className="fp"><Icon name="download" size={11}/></button>
        </div>
        <div className="card-body flush">
          <table className="tbl">
            <thead><tr><th>Reason</th><th>Count</th><th>% of denials</th><th>Top payer</th><th>Resubmission rate</th></tr></thead>
            <tbody>
              {[
                ["Provider not in network direction", 7, 30, "United HC", 86],
                ["Missing documentation",             6, 26, "Aetna",     100],
                ["Application timed out (90d)",       4, 17, "Medicaid",  75],
                ["Specialty mismatch",                3, 13, "BCBS",      67],
                ["Duplicate provider record",         2, 9,  "Cigna",     50],
                ["Other / payer discretion",          1, 4,  "Anthem",    0],
              ].map(([r, c, p, top, re], i) => (
                <tr key={i}>
                  <td><span className="tbl-name" style={{ fontWeight:500 }}>{r}</span></td>
                  <td><span className="mono">{c}</span></td>
                  <td><span className="mono">{p}%</span></td>
                  <td>{top}</td>
                  <td>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:100, height:5, background:"var(--lightgrey)", borderRadius:3 }}>
                        <div style={{ width:`${re}%`, height:"100%", background:re >= 75 ? "var(--green)" : re >= 50 ? "var(--teal)" : "var(--amber)", borderRadius:3 }}/>
                      </div>
                      <span className="mono" style={{ fontWeight:600 }}>{re}%</span>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
};

// ─── App ────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const tabs = [
    { key:"documents", label:"Documents", count:documents.length, icon:"documents" },
    { key:"audit",     label:"Audit log", count:auditEvents.length, icon:"audit" },
    { key:"reports",   label:"Reports",   count:null, icon:"reports" },
  ];

  const sec = t.screen === "audit" ? "audit" : t.screen === "reports" ? "reports" : "documents";
  const crumb = t.screen === "audit" ? "Audit log" : t.screen === "reports" ? "Reports" : "Documents";

  return (
    <>
      <TopBar crumb={crumb}/>
      <div className="app-body">
        <Sidebar activeKey={sec}/>
        <main className="main">
          <div className="tab-strip">
            {tabs.map(tab => (
              <button key={tab.key} className={`tab ${t.screen === tab.key ? "is-active" : ""}`} onClick={() => setTweak("screen", tab.key)}>
                <Icon name={tab.icon} size={13}/>{tab.label}
                {tab.count != null && <span className="tab-count">{tab.count}</span>}
              </button>
            ))}
          </div>

          {t.screen === "documents" && <Documents/>}
          {t.screen === "audit"     && <Audit/>}
          {t.screen === "reports"   && <Reports dateRange={t.dateRange} setTweak={setTweak}/>}
        </main>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Screen">
          <TweakRadio value={t.screen} onChange={v => setTweak("screen", v)}
            options={[
              { value:"documents", label:"Documents" },
              { value:"audit",     label:"Audit" },
              { value:"reports",   label:"Reports" },
            ]}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
